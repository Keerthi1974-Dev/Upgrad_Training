<html>
<head></head>
<body>

<h3>Async / Await Weather Data</h3>
<hr/>

<button onclick="fn_getWeather()">Get Weather</button>
<br/><br/>

<ul id="list1" style="border:2px solid blue; padding:30px;"></ul>


<script>

    var lstObj = document.getElementById("list1");

    async function fn_getWeather()
    {
        navigator.geolocation.getCurrentPosition(async function(position)
        {
            var x = position.coords.latitude;
            var y = position.coords.longitude;

            var url = "https://api.open-meteo.com/v1/forecast?latitude="
                      + x +
                      "&longitude=" + y +
                      "&current_weather=true";

            var response = await window.fetch(url);
            var weatherData = await response.json();

            displayData(weatherData.current_weather);

        },
        function()
        {
            lstObj.innerHTML = "Location permission denied";
        });
    }


    function displayData(dataObject)
    {
        var str = "";

        for(var key in dataObject)
        {
            if(key == "temperature")
            {
                str += "<li> Temperature : " + dataObject[key] + " °C </li>";
            }

            if(key == "windspeed")
            {
                str += "<li> Wind Speed : " + dataObject[key] + " km/h </li>";
            }
        }

        lstObj.innerHTML = str;
    }

</script>

</body>
</html>
