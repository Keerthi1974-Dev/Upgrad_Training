<!DOCTYPE html>
<html>
<head>
    <title>Task Manager - Promise</title>
</head>
<body>

<h3>Task Manager Using Promise</h3>
<hr/>

<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add Task</button>
<button onclick="listTasks()">List Tasks</button>

<ul id="taskList" style="border:2px solid blue; padding:20px;"></ul>

<script>

let tasks = [];

const addTask = () => {

    let task = document.getElementById("taskInput").value;

    new Promise((resolve) => {

        setTimeout(() => {
            tasks.push(task);
            resolve();
        }, 1000);

    }).then(() => {
        document.getElementById("taskInput").value = "";
        listTasks();
    });
};


const listTasks = () => {

    new Promise((resolve) => {

        setTimeout(() => {
            resolve(tasks);
        }, 1000);

    }).then((data) => {

        let str = "";

        data.forEach(function(item, index) {

            str += "<li>" + item +
                   " <button onclick='deleteTask(" + index + ")'>Delete</button>" +
                   "</li>";

        });

        document.getElementById("taskList").innerHTML = str;
    });
};


const deleteTask = (index) => {

    new Promise((resolve) => {

        setTimeout(() => {
            tasks.splice(index, 1);
            resolve();
        }, 1000);

    }).then(() => {
        listTasks();
    });
};

</script>

</body>
</html>
