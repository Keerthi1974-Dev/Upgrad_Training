<!DOCTYPE html>
<html>
<head>
    <title>Feedback Page</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
        }

        #result {
            margin-top: 20px;
            color: green;
        }
    </style>
</head>
<body>

    <h2>Submit Your Feedback</h2>

    <button id="btn">Submit Feedback</button>

    <p id="result"></p>

    <script>
        var btn = document.getElementById("btn");
        var result = document.getElementById("result");

        btn.addEventListener("click", function() {
            result.innerHTML = "Thank you! Your feedback was submitted successfully.";
        });
    </script>

</body>
</html>
