<html>
<head></head>
<body>

<h3>Weather App Using Promise</h3>
<hr/>

<div id="div1" style="border:2px solid blue; padding:10px;"></div>

<script>

    
    var weatherPromise = new Promise(function(resolve, reject) {

        navigator.geolocation.getCurrentPosition(function(position) {

            var x = position.coords.latitude;
            var y = position.coords.longitude;

            var url = "https://api.open-meteo.com/v1/forecast?latitude="
                      + x +
                      "&longitude=" + y +
                      "&current_weather=true";

            fetch(url)
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                resolve(data.current_weather);
            })
            .catch(function() {
                reject("Weather fetch failed");
            });

        }, function() {
            reject("Location permission denied");
        });

    });

    
    weatherPromise
    .then(function(weather) {

        div1.innerHTML += "Temperature : " + weather.temperature + " °C <br>";
        div1.innerHTML += "Wind Speed : " + weather.windspeed + " km/h";

    })
    .catch(function(error) {
        div1.innerHTML = error;
    });

</script>

</body>
</html>
