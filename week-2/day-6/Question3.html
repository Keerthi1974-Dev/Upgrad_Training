<html>
<head>
    <title>Location Logger</title>
</head>

<body onload="loadHistory()">

    <h3>Location-Based Logger</h3>
    <hr/>

    <input type="button" value="Get My Location" onclick="getLocation()" />
    <br/><br/>

    <div id="currentLocation"></div>
    <br/>

    <h4>Last 5 Locations</h4>
    <div id="history"></div>

    <script>

        function getLocation()
        {
            if(navigator.geolocation)
            {
                navigator.geolocation.getCurrentPosition(successCallback, errorCallback);
            }
            else
            {
                document.getElementById("currentLocation").innerText = "Geolocation not supported.";
            }
        }

        function successCallback(position)
        {
            var x = position.coords.latitude;
            var y = position.coords.longitude;

            document.getElementById("currentLocation").innerText =
                "X: " + x + " , Y: " + y;

            var locationObj = {
                x: x,
                y: y
            };

            var history = localStorage.getItem("locationHistory");

            if(history === null)
                history = [];
            else
                history = JSON.parse(history);

            history.push(locationObj);

            if(history.length > 5)
                history.shift();

            localStorage.setItem("locationHistory", JSON.stringify(history));

            loadHistory();
        }

        function errorCallback(error)
        {
            if(error.code === 1)
                document.getElementById("currentLocation").innerText = "Permission denied.";
            else if(error.code === 2)
                document.getElementById("currentLocation").innerText = "Location unavailable.";
            else if(error.code === 3)
                document.getElementById("currentLocation").innerText = "Request timeout.";
        }

        function loadHistory()
        {
            var history = localStorage.getItem("locationHistory");

            if(history !== null)
            {
                var arr = JSON.parse(history);
                var output = "";

                for(var i = 0; i < arr.length; i++)
                {
                    output += "X: " + arr[i].x +
                              " , Y: " + arr[i].y + "<br/>";
                }

                document.getElementById("history").innerHTML = output;
            }
        }

    </script>

</body>
</html>
