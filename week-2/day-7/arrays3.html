<!DOCTYPE html>
<html>
<head>
    <title>Employee Filter</title>
</head>
<body>

<h2>Employee Management System</h2>

<label>Select Job:</label>
<select id="job">
    <option value="All">All Employees</option>
    <option value="Manager">Manager</option>
    <option value="Salesman">Salesman</option>
</select>

<br><br>

<label>Select Employee:</label>
<select id="employee">
    <option value="All">All</option>
</select>

<br><br>

<button onclick="showData()">Show Emps</button>

<br><br>

<div id="output"></div>

<script>

    var employees = [
        { id: 1, name: "Ravi", job: "Manager", salary: 60000 },
        { id: 2, name: "Priya", job: "Salesman", salary: 30000 },
        { id: 3, name: "Amit", job: "Manager", salary: 65000 },
        { id: 4, name: "Kiran", job: "Salesman", salary: 32000 }
    ];

    var jobSelect = document.getElementById("job");
    var empSelect = document.getElementById("employee");
    var output = document.getElementById("output");

    
    jobSelect.onchange = function () {

        var selectedJob = jobSelect.value;

        empSelect.innerHTML = "<option value='All'>All</option>";

        for (var i = 0; i < employees.length; i++) {

            if (selectedJob === "All" || employees[i].job === selectedJob) {

                var opt = document.createElement("option");
                opt.value = employees[i].name;
                opt.text = employees[i].name;
                empSelect.appendChild(opt);
            }
        }
    };

    function showData() {

        var selectedJob = jobSelect.value;
        var selectedEmp = empSelect.value;

        var table = "<table border='1' cellpadding='5'>";
        table += "<tr><th>ID</th><th>Name</th><th>Job</th><th>Salary</th></tr>";

        for (var i = 0; i < employees.length; i++) {

            var emp = employees[i];

            if ((selectedJob === "All" || emp.job === selectedJob) &&
                (selectedEmp === "All" || emp.name === selectedEmp)) {

                table += "<tr>";
                table += "<td>" + emp.id + "</td>";
                table += "<td>" + emp.name + "</td>";
                table += "<td>" + emp.job + "</td>";
                table += "<td>" + emp.salary + "</td>";
                table += "</tr>";
            }
        }

        table += "</table>";

        output.innerHTML = table;
    }

</script>

</body>
</html>
