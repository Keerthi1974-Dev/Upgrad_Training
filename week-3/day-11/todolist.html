<!DOCTYPE html>
<html>
<head>
    <title>Interactive To-Do List</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 40px;
        }

        input {
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 6px 10px;
            margin-left: 5px;
            cursor: pointer;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            margin: 10px 0;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>

<body>

    <h2>To-Do List Application</h2>

    <input type="text" id="taskInput" placeholder="Enter a task">
    <button id="addBtn">Add</button>

    <p>Total Tasks: <span id="totalCount">0</span></p>
    <p>Completed Tasks: <span id="completedCount">0</span></p>

    <ul id="taskList"></ul>

    <script>
        $(document).ready(function() {

            function updateCount() {
                let total = $("#taskList li").length;
                let completed = $("#taskList li.completed").length;

                $("#totalCount").text(total);
                $("#completedCount").text(completed);
            }

            // Add Task
            $("#addBtn").on("click", function() {

                let taskText = $("#taskInput").val();

                if(taskText !== "") {

                    let newTask = `
                        <li>
                            <span>${taskText}</span>
                            <button class="completeBtn">Complete</button>
                            <button class="deleteBtn">Delete</button>
                        </li>
                    `;

                    $("#taskList").append(newTask);
                    $("#taskInput").val("");
                    updateCount();
                }
            });

            // Mark as Complete (Event Delegation)
            $("#taskList").on("click", ".completeBtn", function() {
                $(this).closest("li").toggleClass("completed");
                updateCount();
            });

            // Delete Task (Event Delegation)
            $("#taskList").on("click", ".deleteBtn", function() {
                $(this).closest("li").remove();
                updateCount();
            });

        });
    </script>

</body>
</html>
