<html>
<head>
</head>

<body>

<h3>jQuery Programming - Sunscreen Cart</h3>
<hr/>

<h4>Cart Items : <span id="cartCount">0</span></h4>

<table id="productTable" border="2" width="600px">

    <thead>
        <tr>
            <th>Product Name</th>
            <th>Price</th>
            <th>Action</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody>

        <tr>
            <td>Pilgrim Sunscreen SPF 50</td>
            <td>499</td>
            <td><button class="btnAdd">Add To Cart</button></td>
            <td class="msg"></td>
        </tr>

        <tr>
            <td>Aqualogica Hydrate Sunscreen</td>
            <td>399</td>
            <td><button class="btnAdd">Add To Cart</button></td>
            <td class="msg"></td>
        </tr>

        <tr>
            <td>Mamaearth Ultra Light Sunscreen</td>
            <td>349</td>
            <td><button class="btnAdd">Add To Cart</button></td>
            <td class="msg"></td>
        </tr>

        <tr>
            <td>Everyuth Sun Expert SPF 30</td>
            <td>299</td>
            <td><button class="btnAdd">Add To Cart</button></td>
            <td class="msg"></td>
        </tr>

        <tr>
            <td>Foxtale Matte Finish Sunscreen</td>
            <td>445</td>
            <td><button class="btnAdd">Add To Cart</button></td>
            <td class="msg"></td>
        </tr>

    </tbody>

</table>


<script src="https://code.jquery.com/jquery-3.6.1.min.js"></script>

<script>

$(document).ready(function()
{
    let count = 0;

    // Event Delegation
    $("#productTable").on("click", ".btnAdd", function()
    {
        count++;

        // Update counter
        $("#cartCount").text(count);


        // Disable button
        $(this).prop("disabled", true);
        $(this).attr("title", "Already Added");


        // Shows message in last column
        $(this).closest("tr").find(".msg").text("Added Successfully");
    });

});

</script>

</body>
</html>
