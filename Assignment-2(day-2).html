<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Enrollment Form</title>
</head>
<body>

<header>
    <h1>Course Enrollment</h1>
</header>

<main>
    <section>
        <h2>Enroll Now</h2>

        <!-- Static Progress Bar -->
        <p>Enrollment Completion</p>
        <progress value="50" max="100"></progress>

        <form action="#" method="get/form>

            <fieldset>
                <legend>Personal Details</legend>

                <label for="name">Full Name:</label><br>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br><br>
            </fieldset>

            <fieldset>
                <legend>Course Information</legend>

                <label for="course">Choose Course:</label><br>
                <input list="courses" id="course" name="course" required>

                <datalist id="courses">
                    <option value="Java">
                    <option value="Python">
                    <option value="Web Development">
                    <option value="Data Science">
                </datalist>
                <br><br>

                <label for="experience">Years of Experience:</label><br>
                <input type="number" id="experience" name="experience" min="0" max="10" required>
                <br><br>

                <label for="interest">Interest Level:</label><br>
                <input type="range" id="interest" name="interest" min="0" max="100" required>
                <br><br>

                <label>Skill Level (Beginner–Advanced):</label><br>
                <meter min="0" max="100" low="30" high="70" optimum="90" value="60">
                    60 out of 100
                </meter>
                <br><br>

            </fieldset>

            <input type="submit" value="Submit">

        </form>
    </section>
</main>



</body>
</html>
