<h2>Contact Management</h2>

<!-- Two-way binding -->
<input type="text" [(ngModel)]="searchText" placeholder="Search..." />

<table border="1">
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Status</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let contact of contacts 
              | searchPipe:searchText 
              | slice:0:showCount">

    <!-- Interpolation and pipes -->
    <td>{{ contact.name | titlecase }}</td>
    <td>{{ contact.email | lowercase }}</td>

    <!-- Custom pipe -->
    <td>{{ contact.phone | phoneFormat }}</td>

    <!-- Property binding -->
    <td [style.color]="contact.status ? 'green' : 'red'">
      {{ contact.status | statusPipe }}
    </td>

    <!-- Event binding -->
    <td>
      <button (click)="toggleStatus(contact)">Toggle</button>
    </td>

  </tr>
</table>

<br>

<button (click)="showMore()">Show More</button>
<button (click)="showLess()">Show Less</button>
