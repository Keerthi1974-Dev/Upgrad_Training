<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Hands on</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
        }

        nav {
            background-color: black;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-size: 18px;
        }

        h1 {
            text-align: center;
            font-size: 32px;
        }

        p {
            text-align: center;
            font-size: 18px;
        }

        @media screen and (max-width: 700px) {

            body {
                background-color: lightblue;
            }

            h1 {
                font-size: 24px;
            }

            p {
                font-size: 14px;
            }

            nav a {
                display: block;
                margin: 10px 0;
            }
        }

       

    </style>
</head>

<body>

    <nav>
        <a href="#">HTML</a>
        <a href="#">CSS</a>
        <a href="#">JAVASCRIPT</a>
    </nav>

    <h1>The ultimate Webpage</h1>
    <p>This page changes layout according to the screen size.</p>

</body>
</html>
