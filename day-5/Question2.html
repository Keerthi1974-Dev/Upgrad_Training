<!DOCTYPE html>
<html>
<head>
    <title>User Info Display</title>
</head>
<body>

    <!-- Button -->
    <button onclick="displayUserInfo(user)">Display User Info</button>

    <!-- Paragraphs to display user info -->
    <p id="name"></p>
    <p id="age"></p>
    <p id="city"></p>

    <script>
        // JavaScript object
        var user = {
            name: "Rahul",
            age: 25,
            city: "Hyderabad"
        };

        // Function that accepts object as parameter
        function displayUserInfo(userObj) {
            document.getElementById("name").innerText = "Name: " + userObj.name;
            document.getElementById("age").innerText = "Age: " + userObj.age;
            document.getElementById("city").innerText = "City: " + userObj.city;
        }
    </script>

</body>
</html>
