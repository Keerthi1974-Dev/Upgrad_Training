<!DOCTYPE html>
<html>
<head>
    <title>Number Analysis Tool</title>
</head>
<body>

<script>

    
    let num = 4;

    
    let result = (num >= 0) ? "Positive" : "Negative";
    document.write("The Number is: " + result + "<br>");

    
    if (num % 2 === 0) {
        document.write(" The Number is Even<br>");
    } else {
        document.write("The Number is Odd<br>");
    }

    
    document.write("Numbers from 1 to " + num + ":<br>");
    for (let i = 1; i <= num; i++) {
        document.write(i + "<br>");
    }

</script>

</body>
</html>
